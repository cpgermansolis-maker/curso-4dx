<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="400" height="280" fill="url(#bg)"/>

  <!-- Patrón decorativo: cruz farmacéutica + estantería -->
  <g opacity="0.08" fill="#fff">
    <rect x="320" y="20" width="60" height="60" rx="6"/>
    <rect x="335" y="10" width="30" height="80" rx="4"/>
    <circle cx="60" cy="240" r="50"/>
  </g>

  <!-- Estantes decorativos (almacén) -->
  <g opacity="0.18" stroke="#fff" stroke-width="1.5" fill="none">
    <line x1="30" y1="55" x2="110" y2="55"/>
    <line x1="30" y1="80" x2="110" y2="80"/>
    <line x1="30" y1="105" x2="110" y2="105"/>
    <rect x="40" y="60" width="14" height="18"/>
    <rect x="58" y="60" width="14" height="18"/>
    <rect x="76" y="60" width="14" height="18"/>
    <rect x="40" y="85" width="14" height="18"/>
    <rect x="76" y="85" width="14" height="18"/>
  </g>

  <!-- FEUM grande -->
  <text x="200" y="125" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-weight="900" font-size="70" letter-spacing="6">FEUM</text>

  <!-- Línea decorativa -->
  <line x1="70" y1="148" x2="330" y2="148" stroke="url(#gold)" stroke-width="2"/>

  <!-- Título -->
  <text x="200" y="172" text-anchor="middle" fill="white" font-family="Georgia, serif" font-weight="700" font-size="15">Administración de Inventarios</text>
  <text x="200" y="192" text-anchor="middle" fill="white" font-family="Georgia, serif" font-weight="700" font-size="15">Farmacéuticos</text>

  <!-- Subtítulo -->
  <text x="200" y="214" text-anchor="middle" fill="#a7f3d0" font-family="sans-serif" font-size="10" font-style="italic">Suplemento para Establecimientos 7.0</text>

  <!-- Badge TRIKLES -->
  <rect x="140" y="240" width="120" height="24" rx="12" fill="#fbbf24"/>
  <text x="200" y="256" text-anchor="middle" fill="#064e3b" font-family="sans-serif" font-weight="800" font-size="11" letter-spacing="2">TRIKLES</text>
</svg>
