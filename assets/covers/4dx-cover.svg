<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#3949ab"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#ffb300"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="400" height="280" fill="url(#bg)"/>

  <!-- Patrón decorativo -->
  <g opacity="0.1" fill="#fff">
    <circle cx="340" cy="40" r="80"/>
    <circle cx="50" cy="240" r="60"/>
  </g>

  <!-- 4DX grande -->
  <text x="200" y="120" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-weight="900" font-size="80" letter-spacing="4">4DX</text>

  <!-- Línea decorativa -->
  <line x1="80" y1="145" x2="320" y2="145" stroke="url(#gold)" stroke-width="2"/>

  <!-- Título -->
  <text x="200" y="170" text-anchor="middle" fill="white" font-family="Georgia, serif" font-weight="700" font-size="16">Las 4 Disciplinas</text>
  <text x="200" y="192" text-anchor="middle" fill="white" font-family="Georgia, serif" font-weight="700" font-size="16">de la Ejecución</text>

  <!-- Autores -->
  <text x="200" y="220" text-anchor="middle" fill="#c5cae9" font-family="sans-serif" font-size="10" font-style="italic">McChesney · Covey · Huling</text>

  <!-- Badge TRIKLES -->
  <rect x="140" y="240" width="120" height="24" rx="12" fill="#ff8f00"/>
  <text x="200" y="256" text-anchor="middle" fill="#1a237e" font-family="sans-serif" font-weight="800" font-size="11" letter-spacing="2">TRIKLES</text>
</svg>
